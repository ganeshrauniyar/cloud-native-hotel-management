version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/grand_horizon
      - JWT_SECRET=change_this_to_a_long_random_secret_string
      - JWT_EXPIRES_IN=7d
      - ADMIN_EMAIL=admin@grandhorizon.com
      - ADMIN_PASSWORD=admin123
      - ADMIN_NAME=System Administrator
    ports:
      - "5000:5000"
    # Seed the DB on first boot, then start the server.
    command: sh -c "node server/seed.js && node server/server.js"

volumes:
  mongo_data:
