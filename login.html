<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Grand Horizon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🏨</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; z-index: 1;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--bg-card, rgba(15,23,42,.65));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212,168,83,.18);
      border-radius: 20px; padding: 40px 34px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .auth-logo { text-align: center; margin-bottom: 26px; }
    .auth-logo .icon { font-size: 46px; }
    .auth-logo h1 {
      font-family: 'Playfair Display', serif; font-size: 1.7rem; margin: 8px 0 2px;
      color: var(--gold, #d4a853);
    }
    .auth-logo p { color: var(--text-muted, #8592a8); font-size: .85rem; margin: 0; }
    .auth-form .form-group { margin-bottom: 18px; }
    .auth-form label { display:block; font-size:.8rem; margin-bottom:6px; color: var(--text-secondary, #b6c2d4); }
    .auth-form .form-control { width: 100%; }
    .auth-btn { width: 100%; margin-top: 6px; padding: 13px; font-size: 1rem; }
    .auth-error {
      background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35);
      color: #fca5a5; padding: 10px 14px; border-radius: 10px; font-size: .85rem;
      margin-bottom: 16px; display: none;
    }
    .auth-hint {
      margin-top: 20px; text-align: center; font-size: .78rem;
      color: var(--text-muted, #8592a8); line-height: 1.6;
    }
    .auth-hint code { color: var(--gold, #d4a853); }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="icon">🏨</div>
        <h1>Grand Horizon</h1>
        <p>Hotel Management Suite</p>
      </div>

      <div class="auth-error" id="auth-error"></div>

      <form class="auth-form" id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" class="form-control" id="email" placeholder="admin@grandhorizon.com" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary auth-btn" id="login-btn">Sign In</button>
      </form>

      <div class="auth-hint">
        Default admin — <code>admin@grandhorizon.com</code> / <code>admin123</code><br>
        (created by the seed script; change it in production)
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // If already logged in, skip straight to the dashboard
    if (Auth.isLoggedIn()) window.location.replace('index.html');

    const form = document.getElementById('login-form');
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        await Auth.login(email, password);
        window.location.replace('index.html');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
